<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --card: #1e1e1e;
    --border: #2a2a2a;
    --accent: #c8f055;
    --accent-dim: #a8d03a;
    --text: #f0f0f0;
    --muted: #666;
    --danger: #ff4d4d;
    --pending: #f0a500;
    --done: #c8f055;
    --radius: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 40px 20px;
  }

  /* noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .wrapper {
    max-width: 720px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    margin-bottom: 48px;
    animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tag::before {
    content: '';
    width: 24px;
    height: 1px;
    background: var(--accent);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
  }

  .stats {
    display: flex;
    gap: 24px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
  }

  .stat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .stat-dot.pending { background: var(--pending); }
  .stat-dot.completed { background: var(--done); }
  .stat-dot.total { background: var(--text); }

  /* Form */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 32px;
    animation: slideDown 0.6s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .form-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 8px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 12px;
    align-items: end;
  }

  .input-group { display: flex; flex-direction: column; }

  input[type="text"], select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }

  input[type="text"]::placeholder { color: var(--muted); }

  input[type="text"]:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200, 240, 85, 0.1);
  }

  select option { background: var(--card); }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    white-space: nowrap;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: #0e0e0e;
  }

  .btn-primary:hover { background: var(--accent-dim); }

  .btn-danger {
    background: transparent;
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 8px 14px;
    font-size: 12px;
  }

  .btn-danger:hover { background: rgba(255,77,77,0.1); }

  .btn-edit {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 14px;
    font-size: 12px;
  }

  .btn-edit:hover { border-color: var(--accent); color: var(--accent); }

  /* Filter Bar */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    animation: slideDown 0.6s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .filter-btn {
    padding: 6px 16px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0e0e0e; font-weight: 600; }

  /* Task List */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    transition: border-color 0.2s, transform 0.2s;
  }

  .task-card:hover {
    border-color: #333;
    transform: translateX(4px);
  }

  .task-card.removing {
    animation: fadeOut 0.3s forwards;
  }

  .task-id {
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    font-family: 'DM Mono', monospace;
  }

  .task-body { flex: 1; min-width: 0; }

  .task-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .badge.pending { background: rgba(240,165,0,0.12); color: var(--pending); }
  .badge.pending::before { background: var(--pending); }
  .badge.completed { background: rgba(200,240,85,0.12); color: var(--done); }
  .badge.completed::before { background: var(--done); }

  .task-date {
    font-size: 11px;
    color: var(--muted);
  }

  .task-actions { display: flex; gap: 8px; }

  /* Edit modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 440px;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
  }

  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal h2 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 24px;
  }

  .modal-fields { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 64px 24px;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty p {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
    color: #444;
  }

  .empty span { font-size: 13px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 14px 20px;
    font-size: 13px;
    z-index: 999;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-left-color: var(--danger); }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 13px;
    padding: 40px 0;
    justify-content: center;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeOut { to { opacity: 0; transform: translateX(20px); } }

  @media (max-width: 560px) {
    .form-row { grid-template-columns: 1fr; }
    .task-actions { flex-direction: column; gap: 6px; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="tag">Task Manager</div>
    <h1>YOUR<br><span>TO-DO.</span></h1>
    <div class="stats">
      <div class="stat"><span class="stat-dot total"></span><span id="stat-total">0 total</span></div>
      <div class="stat"><span class="stat-dot pending"></span><span id="stat-pending">0 pending</span></div>
      <div class="stat"><span class="stat-dot completed"></span><span id="stat-done">0 completed</span></div>
    </div>
  </header>

  <!-- Add Task Form -->
  <div class="form-card">
    <div class="form-row">
      <div class="input-group">
        <label class="form-label">Task title</label>
        <input type="text" id="input-title" placeholder="What needs to be done?" />
      </div>
      <div class="input-group">
        <label class="form-label">Status</label>
        <select id="input-status">
          <option value="pending">Pending</option>
          <option value="completed">Completed</option>
        </select>
      </div>
      <div class="input-group">
        <label class="form-label">&nbsp;</label>
        <button class="btn btn-primary" onclick="createTask()">+ Add</button>
      </div>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
  </div>

  <!-- Task List -->
  <div class="task-list" id="task-list">
    <div class="loading"><div class="spinner"></div> Loading tasks...</div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <h2>Edit Task</h2>
    <div class="modal-fields">
      <div class="input-group">
        <label class="form-label">Title</label>
        <input type="text" id="edit-title" placeholder="Task title" />
      </div>
      <div class="input-group">
        <label class="form-label">Status</label>
        <select id="edit-status">
          <option value="pending">Pending</option>
          <option value="completed">Completed</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-edit" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:8000';
  let tasks = [];
  let currentFilter = 'all';
  let editingId = null;

  // ── Fetch all tasks ──────────────────────────────────────────────────────
  async function loadTasks() {
    try {
      const res = await fetch(`${API}/list`);
      if (!res.ok) throw new Error();
      tasks = await res.json();
      renderTasks();
    } catch {
      document.getElementById('task-list').innerHTML = `
        <div class="empty">
          <div class="empty-icon">⚠️</div>
          <p>Can't reach the server</p>
          <span>Make sure your FastAPI backend is running on port 8000</span>
        </div>`;
    }
  }

  // ── Create task ──────────────────────────────────────────────────────────
  async function createTask() {
    const title  = document.getElementById('input-title').value.trim();
    const status = document.getElementById('input-status').value;

    if (!title) { showToast('Please enter a task title', true); return; }

    try {
      const res = await fetch(`${API}/list`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, status, created_at: new Date().toISOString() })
      });
      if (!res.ok) throw new Error();
      document.getElementById('input-title').value = '';
      showToast('Task added!');
      loadTasks();
    } catch {
      showToast('Failed to create task', true);
    }
  }

  // ── Delete task ──────────────────────────────────────────────────────────
  async function deleteTask(id) {
    const card = document.querySelector(`[data-id="${id}"]`);
    if (card) card.classList.add('removing');

    setTimeout(async () => {
      try {
        const res = await fetch(`${API}/list/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error();
        showToast('Task deleted');
        loadTasks();
      } catch {
        showToast('Failed to delete task', true);
        loadTasks();
      }
    }, 280);
  }

  // ── Open edit modal ──────────────────────────────────────────────────────
  function openEdit(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    editingId = id;
    document.getElementById('edit-title').value  = task.title;
    document.getElementById('edit-status').value = task.status;
    document.getElementById('modal').classList.add('open');
  }

  // ── Save edit ────────────────────────────────────────────────────────────
  async function saveEdit() {
    const title  = document.getElementById('edit-title').value.trim();
    const status = document.getElementById('edit-status').value;

    if (!title) { showToast('Title cannot be empty', true); return; }

    try {
      const res = await fetch(`${API}/list/${editingId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, status, created_at: new Date().toISOString() })
      });
      if (!res.ok) throw new Error();
      closeModal();
      showToast('Task updated!');
      loadTasks();
    } catch {
      showToast('Failed to update task', true);
    }
  }

  // ── Close modal ──────────────────────────────────────────────────────────
  function closeModal(e) {
    if (e && e.target !== document.getElementById('modal')) return;
    document.getElementById('modal').classList.remove('open');
    editingId = null;
  }

  // ── Filter ───────────────────────────────────────────────────────────────
  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTasks();
  }

  // ── Render ───────────────────────────────────────────────────────────────
  function renderTasks() {
    const list = document.getElementById('task-list');

    const filtered = currentFilter === 'all'
      ? tasks
      : tasks.filter(t => t.status === currentFilter);

    // update stats
    const total     = tasks.length;
    const pending   = tasks.filter(t => t.status === 'pending').length;
    const completed = tasks.filter(t => t.status === 'completed').length;

    document.getElementById('stat-total').textContent   = `${total} total`;
    document.getElementById('stat-pending').textContent = `${pending} pending`;
    document.getElementById('stat-done').textContent    = `${completed} completed`;

    if (!filtered.length) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📋</div>
          <p>${currentFilter === 'all' ? 'No tasks yet' : `No ${currentFilter} tasks`}</p>
          <span>${currentFilter === 'all' ? 'Add your first task above' : 'Try a different filter'}</span>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map((task, i) => `
      <div class="task-card" data-id="${task.id}" style="animation-delay:${i * 0.05}s">
        <span class="task-id">#${String(task.id).padStart(2,'0')}</span>
        <div class="task-body">
          <div class="task-title">${escHtml(task.title)}</div>
          <div class="task-meta">
            <span class="badge ${task.status}">${task.status}</span>
            <span class="task-date">${formatDate(task.created_at)}</span>
          </div>
        </div>
        <div class="task-actions">
          <button class="btn btn-edit" onclick="openEdit(${task.id})">Edit</button>
          <button class="btn btn-danger" onclick="deleteTask(${task.id})">Del</button>
        </div>
      </div>
    `).join('');
  }

  // ── Helpers ──────────────────────────────────────────────────────────────
  function formatDate(dt) {
    if (!dt) return '';
    const d = new Date(dt);
    return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // Enter key on title input
  document.getElementById('input-title').addEventListener('keydown', e => {
    if (e.key === 'Enter') createTask();
  });

  // Boot
  loadTasks();
</script>
</body>
</html>
